services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: casadiana
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: casadiana123
    ports:
      - "5433:5432"   # 5433 para não colidir com Postgres local
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=casadiana;Username=postgres;Password=casadiana123"
      Jwt__Chave: "casadiana-chave-docker-local-minimo-32-caracteres!"
      Jwt__Emissor: CasaDiAna
      CorsOrigins: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
