server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos gerados pelo Vite (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
