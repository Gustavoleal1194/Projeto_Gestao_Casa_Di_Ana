<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Confirmações — Casa di Ana</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--ada-bg);
    font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center;
    gap: 40px; padding: 40px 24px; flex-wrap: wrap;
  }

  /* keyframes */
  @keyframes overlayIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cardIn     { from { opacity: 0; transform: scale(0.92) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes fadeUp     { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn     { from { opacity: 0; } to { opacity: 1; } }
  @keyframes checkDraw  { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }
  @keyframes circleDraw { from { stroke-dashoffset: 160; } to { stroke-dashoffset: 0; } }
  @keyframes popIn      { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shimmer    { from { background-position: -400px 0; } to { background-position: 400px 0; } }
  @keyframes float      { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes sparkle    { 0% { transform: scale(0) rotate(0deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1) rotate(45deg); opacity: 0; } }
  @keyframes countUp    { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes expandLine { from { width: 0; } to { width: 100%; } }
  @keyframes bounce     { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } 70% { transform: translateY(-2px); } }
  @keyframes ripple     { from { transform: scale(0.6); opacity: 0.6; } to { transform: scale(2.2); opacity: 0; } }

  /* toggle tabs */
  .tab-bar {
    display: flex; gap: 4px; padding: 4px;
    background: var(--ada-surface); border: 1px solid var(--ada-border);
    border-radius: 12px; box-shadow: var(--shadow-xs);
    width: 100%; max-width: 480px;
  }
  .tab {
    flex: 1; padding: 10px 16px; border-radius: 8px;
    font-family: var(--font-display); font-size: 13px; font-weight: 600;
    border: 0; cursor: pointer;
    transition: all 150ms ease;
    color: var(--ada-muted); background: transparent;
  }
  .tab.active { color: #fff; background: linear-gradient(135deg, #D4960C, #B87D0A); box-shadow: 0 3px 10px rgba(212,150,12,0.3); }

  .demo-wrap { position: relative; }
  .demo-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 20px; border-radius: 10px;
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    border: 0; cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #D4960C, #B87D0A);
    box-shadow: 0 4px 14px rgba(212,150,12,0.32);
    transition: box-shadow 150ms ease;
  }
  .demo-btn:hover { box-shadow: 0 6px 20px rgba(212,150,12,0.42); }

  /* overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(7,16,30,0.55);
    backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: overlayIn 200ms ease both;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── shared ─────────────────────────────────────────────── */
const BRAND = '#D4960C';
const BRAND2 = '#B87D0A';
const SUCCESS = '#16A34A';

// Animated counter
function Counter({ to, prefix = '', suffix = '', duration = 900 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(Math.round(eased * to));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [to, duration]);
  return <span>{prefix}{val.toLocaleString('pt-BR')}{suffix}</span>;
}

// Checkmark SVG with draw animation
function CheckMark({ size = 72, delay = 200 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 72 72" fill="none">
      {/* ripple */}
      <circle cx="36" cy="36" r="30" fill="transparent"
        stroke={SUCCESS} strokeWidth="1.5" strokeOpacity="0.3"
        style={{ animation: `ripple 900ms ${delay + 200}ms ease-out both` }}/>
      {/* circle */}
      <circle cx="36" cy="36" r="26"
        stroke={SUCCESS} strokeWidth="2.5" fill="transparent"
        strokeDasharray="163" strokeDashoffset="163"
        style={{ animation: `circleDraw 600ms ${delay}ms cubic-bezier(.4,0,.2,1) both` }}/>
      {/* bg fill */}
      <circle cx="36" cy="36" r="24"
        fill="#F0FDF4"
        style={{ animation: `fadeIn 150ms ${delay + 400}ms ease both` }}/>
      {/* check */}
      <path d="M22 37l9 9 19-19"
        stroke={SUCCESS} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"
        strokeDasharray="60" strokeDashoffset="60"
        style={{ animation: `checkDraw 350ms ${delay + 500}ms cubic-bezier(.4,0,.2,1) both` }}/>
    </svg>
  );
}

// Sparkle dots around icon
function Sparkles({ delay = 800 }) {
  const pts = [
    { top: -14, left: 14,  r: 0 },
    { top: 2,   right: -16, r: 45 },
    { bottom: 0, left: -18, r: -25 },
    { top: -10, right: 4,  r: 20 },
    { bottom: 4, right: -12, r: -40 },
  ];
  return (
    <>
      {pts.map((p, i) => (
        <div key={i} style={{
          position: 'absolute', ...p,
          width: 7, height: 7,
          background: BRAND,
          borderRadius: 2,
          transformOrigin: 'center',
          animation: `sparkle 600ms ${delay + i * 80}ms ease both`,
        }}/>
      ))}
    </>
  );
}

// Separator line
function Sep({ delay = 0 }) {
  return (
    <div style={{
      height: 1, background: 'var(--ada-border)',
      margin: '16px 0',
      position: 'relative', overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: `linear-gradient(90deg, transparent, ${BRAND}55, transparent)`,
        animation: `shimmer 800ms ${delay}ms ease both`,
        backgroundSize: '400px 100%',
      }}/>
    </div>
  );
}

// Row item that slides in
function Row({ label, value, accent = false, delay = 0 }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      padding: '7px 0',
      animation: `fadeUp 350ms ${delay}ms ease both`,
    }}>
      <span style={{
        fontFamily: 'var(--font-sans)', fontSize: 13,
        color: 'var(--ada-muted)', fontWeight: 400,
      }}>{label}</span>
      <span style={{
        fontFamily: 'var(--font-display)', fontSize: 13.5, fontWeight: 600,
        color: accent ? BRAND : 'var(--ada-heading)',
        fontVariantNumeric: 'tabular-nums',
      }}>{value}</span>
    </div>
  );
}

function CloseBtn({ onClose }) {
  return (
    <button onClick={onClose} style={{
      position: 'absolute', top: 16, right: 16,
      width: 32, height: 32, borderRadius: 8,
      background: 'transparent', border: '1px solid var(--ada-border)',
      color: 'var(--ada-muted)', cursor: 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  );
}


/* ═══════════════════════════════════════════════════════════
   MODAL 1 — Confirmação de Venda
═══════════════════════════════════════════════════════════ */
function ConfirmacaoVenda({ onClose }) {
  const items = [
    { nome: 'Croissant de Manteiga', qty: 8, unit: 'R$ 12,90', total: 'R$ 103,20' },
    { nome: 'Cappuccino 300ml',     qty: 5, unit: 'R$ 16,50', total: 'R$   82,50' },
    { nome: 'Bolo de Cenoura',      qty: 3, unit: 'R$ 22,00', total: 'R$   66,00' },
  ];

  return (
    <div onClick={onClose} className="overlay">
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', maxWidth: 440,
        background: 'var(--ada-surface)',
        border: '1px solid var(--ada-border)',
        borderRadius: 20,
        overflow: 'hidden',
        boxShadow: '0 32px 64px rgba(7,16,30,0.20), 0 8px 20px rgba(7,16,30,0.10)',
        animation: 'cardIn 350ms cubic-bezier(0.34,1.4,0.64,1) both',
        position: 'relative',
      }}>
        {/* header accent bar */}
        <div style={{ height: 4, background: `linear-gradient(90deg, ${BRAND}, ${BRAND2})` }}/>
        <CloseBtn onClose={onClose}/>

        <div style={{ padding: '28px 32px 32px' }}>
          {/* icon row */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 18, marginBottom: 22,
            animation: 'fadeUp 300ms 50ms ease both',
          }}>
            <div style={{ position: 'relative', flexShrink: 0 }}>
              <div style={{ animation: 'float 3000ms 1000ms ease-in-out infinite' }}>
                <CheckMark size={64} delay={100}/>
              </div>
              <Sparkles delay={700}/>
            </div>
            <div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 10.5, fontWeight: 600,
                textTransform: 'uppercase', letterSpacing: '0.14em', color: SUCCESS,
                marginBottom: 4,
                animation: 'fadeIn 300ms 700ms ease both',
              }}>
                Venda registrada
              </div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700,
                color: 'var(--ada-heading)', letterSpacing: '-0.02em',
                animation: 'fadeUp 300ms 400ms ease both',
              }}>
                <Counter to={251.70} prefix="R$ " suffix="" duration={1100}/>
              </div>
              <div style={{
                fontSize: 12, color: 'var(--ada-muted)', marginTop: 4,
                animation: 'fadeIn 300ms 900ms ease both',
              }}>
                Hoje · {new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })} · 3 produtos
              </div>
            </div>
          </div>

          {/* product list */}
          <div style={{
            background: 'var(--ada-surface-2)',
            border: '1px solid var(--ada-border)',
            borderRadius: 12,
            padding: '4px 16px',
            marginBottom: 16,
          }}>
            {/* thead */}
            <div style={{
              display: 'flex', justifyContent: 'space-between',
              padding: '8px 0 6px',
              fontSize: 10.5, fontWeight: 600, fontFamily: 'var(--font-display)',
              color: 'var(--ada-muted)', textTransform: 'uppercase', letterSpacing: '0.08em',
              borderBottom: '1px solid var(--ada-border-sub)',
              animation: 'fadeIn 250ms 500ms ease both',
            }}>
              <span style={{ flex: 1 }}>Produto</span>
              <span style={{ width: 32, textAlign: 'right' }}>Qtd</span>
              <span style={{ width: 80, textAlign: 'right' }}>Total</span>
            </div>
            {items.map((it, i) => (
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '9px 0',
                borderBottom: i < items.length - 1 ? '1px solid var(--ada-border-sub)' : 'none',
                animation: `fadeUp 280ms ${650 + i * 100}ms ease both`,
              }}>
                <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: 'var(--ada-heading)' }}>{it.nome}</span>
                <span style={{ width: 32, textAlign: 'right', fontSize: 13, color: 'var(--ada-muted)', fontVariantNumeric: 'tabular-nums' }}>{it.qty}</span>
                <span style={{ width: 80, textAlign: 'right', fontSize: 13, fontWeight: 600, color: 'var(--ada-heading)', fontVariantNumeric: 'tabular-nums', fontFamily: 'var(--font-display)' }}>{it.total}</span>
              </div>
            ))}
          </div>

          {/* summary rows */}
          <div style={{
            background: 'var(--ada-surface)',
            border: '1px solid var(--ada-border)',
            borderRadius: 12, padding: '6px 16px',
            marginBottom: 20,
          }}>
            <Row label="Subtotal"         value="R$ 251,70" delay={900}/>
            <Row label="Forma de pagamento" value="Dinheiro"  delay={960}/>
            <Row label="Operador"          value="Ana Ribeiro" delay={1020}/>
            <div style={{ borderTop: '1px solid var(--ada-border-sub)', marginTop: 4, paddingTop: 4 }}>
              <Row label="Estoque baixado automaticamente" value="✓" accent delay={1080}/>
            </div>
          </div>

          {/* CTA */}
          <div style={{
            display: 'flex', gap: 10,
            animation: 'fadeUp 300ms 1100ms ease both',
          }}>
            <button onClick={onClose} style={{
              flex: 1, padding: '11px 0', borderRadius: 10,
              fontFamily: 'var(--font-display)', fontSize: 13.5, fontWeight: 600,
              color: 'var(--ada-heading)', background: 'var(--ada-surface-2)',
              border: '1px solid var(--ada-border)', cursor: 'pointer',
            }}>
              Nova Venda
            </button>
            <button onClick={onClose} style={{
              flex: 2, padding: '11px 0', borderRadius: 10,
              fontFamily: 'var(--font-display)', fontSize: 13.5, fontWeight: 600,
              color: '#fff',
              background: `linear-gradient(135deg, ${BRAND}, ${BRAND2})`,
              border: 0, cursor: 'pointer',
              boxShadow: '0 4px 14px rgba(212,150,12,0.30)',
            }}>
              Ver Relatório de Vendas →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════
   MODAL 2 — Confirmação de Produção
═══════════════════════════════════════════════════════════ */
function CheckMarkOrange({ size = 64, delay = 100 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="30" fill="transparent"
        stroke={BRAND} strokeWidth="1.5" strokeOpacity="0.3"
        style={{ animation: `ripple 900ms ${delay + 200}ms ease-out both` }}/>
      <circle cx="36" cy="36" r="26"
        stroke={BRAND} strokeWidth="2.5" fill="transparent"
        strokeDasharray="163" strokeDashoffset="163"
        style={{ animation: `circleDraw 600ms ${delay}ms cubic-bezier(.4,0,.2,1) both` }}/>
      <circle cx="36" cy="36" r="24"
        fill="#FFFBEB"
        style={{ animation: `fadeIn 150ms ${delay + 400}ms ease both` }}/>
      <path d="M22 37l9 9 19-19"
        stroke={BRAND} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"
        strokeDasharray="60" strokeDashoffset="60"
        style={{ animation: `checkDraw 350ms ${delay + 500}ms cubic-bezier(.4,0,.2,1) both` }}/>
    </svg>
  );
}

function IngredientBar({ nome, consumed, unit, delay = 0 }) {
  const [width, setWidth] = useState(0);
  useEffect(() => {
    const id = setTimeout(() => setWidth(consumed), delay + 500);
    return () => clearTimeout(id);
  }, [consumed, delay]);

  return (
    <div style={{
      animation: `fadeUp 280ms ${delay}ms ease both`,
      marginBottom: 10,
    }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between',
        fontSize: 12, fontFamily: 'var(--font-sans)',
        color: 'var(--ada-body)', marginBottom: 4,
      }}>
        <span style={{ fontWeight: 500 }}>{nome}</span>
        <span style={{ color: 'var(--ada-muted)', fontVariantNumeric: 'tabular-nums' }}>
          −{unit}
        </span>
      </div>
      <div style={{
        height: 5, borderRadius: 9999,
        background: 'var(--ada-border)',
        overflow: 'hidden',
      }}>
        <div style={{
          height: '100%', borderRadius: 9999,
          background: `linear-gradient(90deg, ${BRAND}, ${BRAND2})`,
          width: `${width}%`,
          transition: 'width 800ms cubic-bezier(.4,0,.2,1)',
        }}/>
      </div>
    </div>
  );
}

function ConfirmacaoProducao({ onClose }) {
  const insumos = [
    { nome: 'Farinha de Trigo T.00', consumed: 78, unit: '3,2 kg' },
    { nome: 'Manteiga Sem Sal',     consumed: 52, unit: '0,8 kg' },
    { nome: 'Ovos Caipira',         consumed: 67, unit: '24 un'  },
    { nome: 'Açúcar Demerara',      consumed: 35, unit: '1,1 kg' },
  ];

  return (
    <div onClick={onClose} className="overlay">
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', maxWidth: 460,
        background: 'var(--ada-surface)',
        border: '1px solid var(--ada-border)',
        borderRadius: 20,
        overflow: 'hidden',
        boxShadow: '0 32px 64px rgba(7,16,30,0.20), 0 8px 20px rgba(7,16,30,0.10)',
        animation: 'cardIn 350ms cubic-bezier(0.34,1.4,0.64,1) both',
        position: 'relative',
      }}>
        <div style={{ height: 4, background: `linear-gradient(90deg, ${BRAND}, #E8A520)` }}/>
        <CloseBtn onClose={onClose}/>

        <div style={{ padding: '28px 32px 32px' }}>

          {/* icon + hero */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 18, marginBottom: 22,
            animation: 'fadeUp 300ms 50ms ease both',
          }}>
            <div style={{ position: 'relative', flexShrink: 0 }}>
              <div style={{ animation: 'float 3000ms 1000ms ease-in-out infinite' }}>
                <CheckMarkOrange size={64} delay={100}/>
              </div>
              <Sparkles delay={700}/>
            </div>
            <div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 10.5, fontWeight: 600,
                textTransform: 'uppercase', letterSpacing: '0.14em', color: BRAND,
                marginBottom: 4,
                animation: 'fadeIn 300ms 700ms ease both',
              }}>
                Lote registrado
              </div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700,
                color: 'var(--ada-heading)', letterSpacing: '-0.02em',
                animation: 'fadeUp 300ms 400ms ease both',
              }}>
                <Counter to={48} suffix=" unidades" duration={900}/>
              </div>
              <div style={{
                fontSize: 12, color: 'var(--ada-muted)', marginTop: 4,
                animation: 'fadeIn 300ms 900ms ease both',
              }}>
                Croissant de Manteiga · Lote #204 · 14:32
              </div>
            </div>
          </div>

          {/* stat chips */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10,
            marginBottom: 20,
            animation: 'fadeUp 300ms 550ms ease both',
          }}>
            {[
              { label: 'Custo total',   value: 'R$ 186,40', color: 'var(--ada-heading)' },
              { label: 'Custo unitário', value: 'R$ 3,88',  color: 'var(--ada-heading)' },
              { label: 'Validade',       value: '3 dias',    color: BRAND2 },
            ].map((s, i) => (
              <div key={i} style={{
                background: 'var(--ada-surface-2)',
                border: '1px solid var(--ada-border)',
                borderRadius: 12, padding: '12px 14px',
              }}>
                <div style={{ fontSize: 10.5, fontFamily: 'var(--font-display)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ada-muted)', marginBottom: 6 }}>
                  {s.label}
                </div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: s.color, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.01em' }}>
                  {s.value}
                </div>
              </div>
            ))}
          </div>

          {/* insumos consumidos */}
          <div style={{
            background: 'var(--ada-surface)',
            border: '1px solid var(--ada-border)',
            borderRadius: 12, padding: '14px 16px',
            marginBottom: 20,
          }}>
            <div style={{
              fontFamily: 'var(--font-display)', fontSize: 10.5, fontWeight: 600,
              textTransform: 'uppercase', letterSpacing: '0.1em',
              color: 'var(--ada-muted)', marginBottom: 14,
              animation: 'fadeIn 250ms 600ms ease both',
            }}>
              Insumos baixados do estoque
            </div>
            {insumos.map((ing, i) => (
              <IngredientBar key={i} {...ing} delay={700 + i * 80}/>
            ))}
          </div>

          {/* ficha técnica nota */}
          <div style={{
            display: 'flex', alignItems: 'flex-start', gap: 10,
            padding: '10px 14px', borderRadius: 10,
            background: '#FFFBEB', border: '1px solid #FDE68A',
            marginBottom: 20,
            animation: 'fadeUp 280ms 1000ms ease both',
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#92580A" strokeWidth="1.8" strokeLinecap="round" style={{ flexShrink: 0, marginTop: 1 }}>
              <path d="M13 16h-1v-4h-1m1-4h.01"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
            <span style={{ fontSize: 12.5, color: '#7A5206', lineHeight: 1.45 }}>
              Baixa calculada automaticamente pela ficha técnica do produto — 0,067kg de farinha por unidade.
            </span>
          </div>

          {/* CTAs */}
          <div style={{
            display: 'flex', gap: 10,
            animation: 'fadeUp 300ms 1100ms ease both',
          }}>
            <button onClick={onClose} style={{
              flex: 1, padding: '11px 0', borderRadius: 10,
              fontFamily: 'var(--font-display)', fontSize: 13.5, fontWeight: 600,
              color: 'var(--ada-heading)', background: 'var(--ada-surface-2)',
              border: '1px solid var(--ada-border)', cursor: 'pointer',
            }}>
              Novo Lote
            </button>
            <button onClick={onClose} style={{
              flex: 2, padding: '11px 0', borderRadius: 10,
              fontFamily: 'var(--font-display)', fontSize: 13.5, fontWeight: 600,
              color: '#fff',
              background: `linear-gradient(135deg, ${BRAND}, ${BRAND2})`,
              border: 0, cursor: 'pointer',
              boxShadow: '0 4px 14px rgba(212,150,12,0.30)',
            }}>
              Ver Relatório de Produção →
            </button>
          </div>
        </div>
      </div>
