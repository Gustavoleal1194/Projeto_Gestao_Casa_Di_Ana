databases:
  - name: casadiana-db
    databaseName: casadiana
    user: casadiana
    plan: free

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: casadiana-api
    runtime: docker
    dockerfilePath: ./CasaDiAna/Dockerfile
    dockerContext: ./CasaDiAna
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: casadiana-db
          property: connectionString
      - key: Jwt__Chave
        generateValue: true
      - key: Jwt__Emissor
        value: CasaDiAna
      - key: CorsOrigins
        value: https://casadiana-frontend.onrender.com

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: casadiana-frontend
    runtime: docker
    dockerfilePath: ./CasaDiAna/frontend/Dockerfile
    dockerContext: ./CasaDiAna/frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://casadiana-api.onrender.com/api
