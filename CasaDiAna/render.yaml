databases:
  - name: casadiana-db
    databaseName: casadiana
    user: casadiana
    plan: free

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: casadiana-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /swagger/v1/swagger.json
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: casadiana-db
          property: connectionString
      - key: Jwt__Chave
        generateValue: true   # Render gera uma chave aleatória segura
      - key: Jwt__Emissor
        value: CasaDiAna
      - key: CorsOrigins
        value: https://casadiana-frontend.onrender.com   # ajustar após 1º deploy

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: casadiana-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://casadiana-api.onrender.com/api   # ajustar após 1º deploy do backend
